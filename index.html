<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌓 Toggle Mode</button>
    <h1>Lotto Number Generator</h1>
    <lotto-generator></lotto-generator>

    <div class="contact-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xbdzrknn" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">성함</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="company">회사명/서비스명</label>
                <input type="text" id="company" name="company" placeholder="회사 또는 서비스 이름">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="5" placeholder="제휴 제안 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <div id="disqus_thread" class="comments-section"></div>
